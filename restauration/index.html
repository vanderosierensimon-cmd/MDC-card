<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions du jour — La Maison du Canal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #1C1C1C;
      font-family: 'Caveat', cursive;
      color: #fff;
      overflow: hidden;
    }

    /* Logo en filigrane */
    .bg-logo {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28vw;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 4vh 8vw;
      gap: 2.5vh;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: clamp(2.2rem, 5.5vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.12);
    }

    .header-divider {
      border: none;
      border-top: 2px dashed rgba(255,255,255,0.25);
      margin: 1.2vh auto 0;
      width: 50%;
    }

    /* ===== GRID ===== */
    #content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .grid {
      flex: 1;
      min-height: 0;
      display: grid;
      gap: 1.5vh 2.5vw;
      grid-auto-rows: 1fr;
    }

    .grid.cols-1 { grid-template-columns: 1fr; }
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }

    /* ===== CARD ===== */
    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5vh 2vw;
      display: flex;
      flex-direction: column;
      gap: 0.6vh;
      overflow: hidden;
    }

    .badge {
      display: inline-block;
      font-size: clamp(0.6rem, 0.9vw, 0.85rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 12px;
      border-radius: 20px;
      align-self: flex-start;
      flex-shrink: 0;
    }
    .badge.entree  { background: rgba(74,153,74,0.35);    color: #a8e6a8; }
    .badge.plat    { background: rgba(255,255,255,0.15);  color: #e8e8e8; }
    .badge.dessert { background: rgba(200,100,130,0.35);  color: #f4b8c8; }

    /* Nom + prix sur la même ligne */
    .card-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1.5vw;
    }

    .card-name {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 600;
      line-height: 1.1;
      flex: 1;
      min-width: 0;
    }

    .card-price {
      font-size: clamp(1.6rem, 2.8vw, 2.6rem);
      font-weight: 700;
      color: #C6A15B;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: clamp(1rem, 1.6vw, 1.6rem);
      color: rgba(255,255,255,0.5);
      line-height: 1.2;
    }

    .card.rupture .card-name,
    .card.rupture .card-price {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .card-rupture-badge {
      font-size: clamp(0.7rem, 1vw, 1rem);
      color: #e88080;
      margin-top: 0.3vh;
    }

    /* ===== EMPTY ===== */
    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty p {
      font-size: clamp(2rem, 5vw, 4rem);
      color: rgba(255,255,255,0.4);
      text-align: center;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      font-size: clamp(0.9rem, 1.5vw, 1.4rem);
      color: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Logo filigrane -->
  <img class="bg-logo" src="../assets/logo-blanc.png" alt="">

  <div class="page">
    <div class="header">
      <h1>Suggestions du jour</h1>
      <hr class="header-divider">
    </div>

    <div id="content"></div>

    <div class="footer">La Maison du Canal &bull; Rue du Canal 6, Leers-Nord</div>
  </div>

  <script>
    var SUPABASE_URL = 'https://aqcqfovvyliizfiavhur.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxY3Fmb3Z2eWxpaXpmaWF2aHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NjI4OTEsImV4cCI6MjA4NTMzODg5MX0.EMauvyJ5lXJmSWjFFMVQwv0LaTSI3A78sHU2DZIdn54';
    var typeLabels = { entree: 'Entrée', plat: 'Plat', dessert: 'Dessert' };

    var typeOrder = { entree: 0, plat: 1, dessert: 2 };

    function render(suggestions) {
      var actives = suggestions
        .filter(function(s) { return s.actif; })
        .sort(function(a, b) { return (typeOrder[a.type] ?? 9) - (typeOrder[b.type] ?? 9); })
        .slice(0, 6);
      var content = document.getElementById('content');

      if (actives.length === 0) {
        content.innerHTML = '<div class="empty"><p>Demandez à votre serveur</p></div>';
        return;
      }

      var cols = actives.length >= 4 ? 'cols-2' : 'cols-1';
      var cards = actives.map(function(s) {
        var prix = parseFloat(s.prix).toFixed(2).replace('.', ',') + ' €';
        var desc = s.description
          ? '<span class="card-desc">' + s.description + '</span>'
          : '';
        var ruptureBadge = s.en_rupture
          ? '<span class="card-rupture-badge">Rupture de stock</span>'
          : '';
        var ruptureClass = s.en_rupture ? ' rupture' : '';
        return [
          '<div class="card' + ruptureClass + '">',
          '  <span class="badge ' + s.type + '">' + (typeLabels[s.type] || s.type) + '</span>',
          '  <div class="card-row">',
          '    <span class="card-name">' + s.nom + '</span>',
          '    <span class="card-price">' + prix + '</span>',
          '  </div>',
          desc,
          ruptureBadge,
          '</div>'
        ].join('');
      }).join('');

      content.innerHTML = '<div class="grid ' + cols + '">' + cards + '</div>';
    }

    // Fetch depuis Supabase — rafraîchissement toutes les 60 secondes
    function loadAndRender() {
      fetch(SUPABASE_URL + '/rest/v1/suggestions?select=*&order=type', {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': 'Bearer ' + SUPABASE_ANON
        }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { render(data); })
      .catch(function() { render([]); });
    }

    loadAndRender();
    setInterval(loadAndRender, 60000);
  </script>
</body>
</html>
