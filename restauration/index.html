<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions du jour — La Maison du Canal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #1C1C1C;
      font-family: 'Caveat', cursive;
      color: #fff;
      overflow: hidden;
    }

    .page {
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 5vh 8vw;
      gap: 3vh;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.12);
    }

    .header-divider {
      border: none;
      border-top: 2px dashed rgba(255,255,255,0.25);
      margin: 1.5vh auto 0;
      width: 50%;
    }

    /* ===== GRID ===== */
    .grid {
      flex: 1;
      display: grid;
      gap: 2vw;
      align-content: center;
    }

    .grid.cols-1 { grid-template-columns: 1fr; }
    .grid.cols-2 { grid-template-columns: 1fr 1fr; }

    /* ===== CARD ===== */
    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: clamp(1rem, 2.5vw, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .badge {
      display: inline-block;
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 14px;
      border-radius: 20px;
      align-self: flex-start;
    }
    .badge.entree  { background: rgba(74,153,74,0.35); color: #a8e6a8; }
    .badge.plat    { background: rgba(255,255,255,0.15); color: #e8e8e8; }
    .badge.dessert { background: rgba(200,100,130,0.35); color: #f4b8c8; }

    .card-name {
      font-size: clamp(2rem, 4.5vw, 3.8rem);
      font-weight: 600;
      line-height: 1.1;
    }

    .card-desc {
      font-size: clamp(1.2rem, 2.5vw, 2.2rem);
      color: rgba(255,255,255,0.55);
    }

    .card-price {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      color: #C6A15B;
      text-align: right;
      margin-top: auto;
    }

    /* ===== EMPTY ===== */
    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty p {
      font-size: clamp(2rem, 5vw, 4rem);
      color: rgba(255,255,255,0.4);
      text-align: center;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      font-size: clamp(1rem, 1.8vw, 1.6rem);
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Suggestions du jour</h1>
      <hr class="header-divider">
    </div>

    <div id="content"></div>

    <div class="footer">La Maison du Canal &bull; Rue du Canal 6, Leers-Nord</div>
  </div>

  <script>
    var API_URL = 'https://mdc-menu.vercel.app/api/suggestions';
    var typeLabels = { entree: 'Entrée', plat: 'Plat', dessert: 'Dessert' };

    function render(suggestions) {
      var actives = suggestions.filter(function(s) { return s.actif; }).slice(0, 6);
      var content = document.getElementById('content');

      if (actives.length === 0) {
        content.innerHTML = '<div class="empty"><p>Demandez à votre serveur</p></div>';
        return;
      }

      var cols = actives.length >= 4 ? 'cols-2' : 'cols-1';
      var cards = actives.map(function(s) {
        var prix = parseFloat(s.prix).toFixed(2).replace('.', ',') + ' €';
        var desc = s.description
          ? '<span class="card-desc">' + s.description + '</span>'
          : '';
        return [
          '<div class="card">',
          '  <span class="badge ' + s.type + '">' + (typeLabels[s.type] || s.type) + '</span>',
          '  <span class="card-name">' + s.nom + '</span>',
          desc,
          '  <span class="card-price">' + prix + '</span>',
          '</div>'
        ].join('');
      }).join('');

      content.innerHTML = '<div class="grid ' + cols + '">' + cards + '</div>';
    }

    fetch(API_URL)
      .then(function(r) { return r.json(); })
      .then(render)
      .catch(function() {
        document.getElementById('content').innerHTML =
          '<div class="empty"><p>Demandez à votre serveur</p></div>';
      });
  </script>
</body>
</html>
